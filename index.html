        function renderHeatmap(avs, tMs) {
            const dMap = {}; avs.forEach(a => { if(!dMap[a.available_date]) dMap[a.available_date] = []; dMap[a.available_date].push(a); });
            const sDs = Object.keys(dMap).sort(), hmC = document.getElementById('room-heatmap');

        window.openTimeline = (dateStr) => { hideTooltip(); const dayAvs = roomAvailsCache.filter(a => a.available_date === dateStr); if(dayAvs.length === 0) return; const dObj = new Date(dateStr), m = String(dObj.getMonth() + 1).padStart(2, '0'), d = String(dObj.getDate()).padStart(2, '0'), w = dObj.toLocaleDateString('ko-KR', {weekday:'short'}); document.getElementById('timeline-date-title').innerText = `${m}/${d} (${w}) 타임라인`; document.getElementById('timeline-bars').innerHTML = dayAvs.map(a => { const sP = timeToPercent(a.start_time), eP = timeToPercent(a.end_time), wP = eP - sP; return `<div class="flex items-center group h-5 md:h-6"><div class="timeline-label">${a.users.nickname}</div><div class="flex-1 relative h-full bg-white border border-slate-200 rounded overflow-hidden"><div class="absolute top-0 h-full bg-indigo-400 rounded-sm shadow-sm group-hover:bg-indigo-500" style="left: ${sP}%; width: ${wP}%;"></div><div class="absolute inset-0 flex items-center justify-center text-[7px] md:text-[8px] font-mono font-black text-white opacity-0 group-hover:opacity-100 z-10 pointer-events-none drop-shadow-md" style="left: ${sP}%; width: ${wP}%;">${a.start_time.slice(0,5)}~${a.end_time.slice(0,5)}</div></div></div>`; }).join(''); toggle('timeline-panel', true); setTimeout(() => document.getElementById('timeline-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100); };

        window.addMyAvail = async () => { const sD = document.getElementById('in-my-start-date').value, eD = document.getElementById('in-my-end-date').value, tS = document.getElementById('in-my-start').value, tE = document.getElementById('in-my-end').value; if(!sD || !tS || !tE) return alert("시작 날짜와 시간을 입력해 주세요."); const fED = eD ? eD : sD; let sDt = new Date(sD), eDt = new Date(fED); if (eDt < sDt) return alert("종료일이 시작일보다 빠를 수 없습니다."); if (selectedWeekdays.length === 0) return alert("최소 하루의 요일을 선택해 주세요."); const ps = []; let limit = 365; for (let d = new Date(sDt); d <= eDt; d.setDate(d.getDate() + 1)) { if (limit-- < 0) break; if (selectedWeekdays.includes(d.getDay())) ps.push({ session_id: currentSessionId, user_id: userState.id, available_date: d.toISOString().split('T')[0], start_time: tS, end_time: tE }); } if (ps.length === 0) return alert("기간 내 선택된 요일이 없습니다."); const { error } = await client.from('session_availability').insert(ps); if (error) alert(error.message); else renderRoom(); };

        window.removeConfirmedSchedule = async (idx) => { const s = allSessions.find(x => x.id === currentSessionId); s.confirmed_schedules.splice(idx, 1); await client.from('sessions').update({ confirmed_schedules: s.confirmed_schedules, status: s.confirmed_schedules.length > 0 ? 'confirmed' : 'recruiting' }).eq('id', currentSessionId); renderRoom(); };
        document.getElementById('btn-create-delete').onclick = async () => { const sId = document.getElementById('edit-session-id').value; if (!sId || !confirm("세션을 영구 삭제하시겠습니까?")) return; const { error } = await client.from('sessions').delete().eq('id', sId).eq('creator_id', userState.id); if (error) alert(error.message); else { toggle('modal-create', false); goLobby(); } };
        async function updateProfile(user) { userState = user; toggle('btn-login', false); toggle('user-profile', true); document.getElementById('profile-img').src = user.user_metadata.avatar_url; const { data } = await client.from('users').select('nickname').eq('id', user.id).single(); const dN = data?.nickname || user.user_metadata.full_name; document.getElementById('display-name').innerText = dN; await client.from('users').upsert({ id: user.id, nickname: dN, avatar_url: user.user_metadata.avatar_url }); }
        client.auth.onAuthStateChange((event, session) => { if (session) updateProfile(session.user); else { userState = null; toggle('btn-login', true); toggle('user-profile', false); } currentSessionId ? renderRoom() : renderLobby(); });
        document.getElementById('btn-login').onclick = () => client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } });
        document.getElementById('btn-logout').onclick = async () => { await client.auth.signOut(); localStorage.clear(); window.location.replace(window.location.origin + window.location.pathname); };
        
        document.getElementById('btn-open-create').onclick = () => { 
            document.getElementById('edit-session-id').value = ""; document.getElementById('modal-title').innerText = "🎲 새 세션 개설"; 
            window.resetRuleUI(); // 룰 입력창 초기화
            document.getElementById('in-title').value = ""; document.getElementById('in-desc').value = ""; currentTags = []; renderTagUI(); document.getElementById('color-hex-display').innerText = '배너 컬러'; document.getElementById('in-cap').value = '4'; window.toggleCustomCap(); toggle('btn-create-delete', false); toggle('modal-create', true); 
        };
        document.getElementById('btn-create-close').onclick = () => toggle('modal-create', false);
        document.getElementById('mode-on').onclick = () => { locType = 'online'; updateLocUI(); };
        document.getElementById('mode-off').onclick = () => { locType = 'offline'; updateLocUI(); };
        const updateLocUI = () => { const isOn = locType === 'online'; document.getElementById('mode-on').className = isOn ? "flex-1 py-3 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-600 font-bold text-xs md:text-sm" : "flex-1 py-3 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-xs md:text-sm"; document.getElementById('mode-off').className = !isOn ? "flex-1 py-3 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-600 font-bold text-xs md:text-sm" : "flex-1 py-3 rounded-xl border-2 border-slate-100 text-slate-400 font-bold text-xs md:text-sm"; };
        
        // [핵심 패치] 저장 시 어느 칸에서 데이터를 가져올지 판단하는 로직
        document.getElementById('btn-create-submit').onclick = async () => { 
            if (!userState) return; 
            
            let ruleVal = "";
            if (!document.getElementById('in-rule-custom').classList.contains('hidden')) {
                ruleVal = document.getElementById('in-rule-custom').value.trim();
            } else if (!document.getElementById('in-rule-all').classList.contains('hidden')) {
                ruleVal = document.getElementById('in-rule-all').value;
            } else {
                ruleVal = document.getElementById('in-rule-primary').value;
            }
            if (!ruleVal || ruleVal === 'show_all' || ruleVal === 'custom') return alert("사용 룰을 선택하거나 입력해 주세요.");

            let capV = document.getElementById('in-cap').value; if (capV === 'custom') { capV = document.getElementById('in-cap-custom').value; if (!capV || isNaN(capV) || capV < 1) return alert("인원수를 입력하세요."); } 
            const pl = { title: document.getElementById('in-title').value, rule: ruleVal, description: document.getElementById('in-desc').value, capacity: capV, location_type: locType, location_detail: document.getElementById('in-loc').value, banner_color: document.getElementById('in-color').value, creator_id: userState.id, tags: currentTags }; const sId = document.getElementById('edit-session-id').value; const { error } = sId ? await client.from('sessions').update(pl).eq('id', sId) : await client.from('sessions').insert(pl); if (error) alert(error.message); else { toggle('modal-create', false); currentSessionId ? renderRoom() : renderLobby(); } 
        };
        
        // [핵심 패치] 수정창을 열 때 기존 데이터를 알맞은 칸에 매핑하는 로직
        window.openEditModal = (id) => { 
            const s = allSessions.find(item => item.id === id); if (!s) return; 
            document.getElementById('edit-session-id').value = s.id; document.getElementById('modal-title').innerText = "🎲 세션 수정"; document.getElementById('in-title').value = s.title; 
            
            window.resetRuleUI();
            const popRules = ['크툴루의 부름(CoC)', '인세인(inSANe)', '마기카로기아(마기로기)', '더블크로스(Double Cross)', '던전월드', '피아스코'];
            if (popRules.includes(s.rule)) {
                document.getElementById('in-rule-primary').value = s.rule;
            } else if (ALL_RULES_DB.includes(s.rule)) {
                document.getElementById('in-rule-primary').classList.add('hidden');
                document.getElementById('in-rule-all').classList.remove('hidden');
                document.getElementById('btn-rule-cancel').classList.remove('hidden');
                document.getElementById('in-rule-all').value = s.rule;
            } else {
                document.getElementById('in-rule-primary').classList.add('hidden');
                document.getElementById('in-rule-custom').classList.remove('hidden');
                document.getElementById('btn-rule-cancel').classList.remove('hidden');
                document.getElementById('in-rule-custom').value = s.rule;
            }

            document.getElementById('in-desc').value = s.description || ""; document.getElementById('in-loc').value = s.location_detail; document.getElementById('in-color').value = s.banner_color; window.updateColorDisplay(s.banner_color); let cap = s.capacity; if (cap >= 1 && cap <= 10) { document.getElementById('in-cap').value = cap; window.toggleCustomCap(); } else { document.getElementById('in-cap').value = 'custom'; window.toggleCustomCap(); document.getElementById('in-cap-custom').value = cap; } currentTags = s.tags || []; renderTagUI(); locType = s.location_type; updateLocUI(); toggle('btn-create-delete', true); toggle('modal-create', true); 
        };
        
        function renderTagUI() { document.getElementById('modal-tags-container').innerHTML = AVAILABLE_TAGS.map(tag => { const isS = currentTags.includes(tag); return `<button type="button" onclick="toggleSessionTag('${tag}')" class="py-1 md:py-1.5 px-2 md:px-3 rounded-lg md:rounded-xl border-2 text-[9px] md:text-[10px] font-black transition-colors ${isS ? 'bg-indigo-50 border-indigo-600 text-indigo-600' : 'bg-white border-slate-200 text-slate-400'}">#${tag}</button>`; }).join(''); }
        window.toggleSessionTag = (tag) => { currentTags = currentTags.includes(tag) ? currentTags.filter(t => t !== tag) : [...currentTags, tag]; renderTagUI(); };
        window.toggleCustomCap = () => { const isC = document.getElementById('in-cap').value === 'custom'; toggle('in-cap-custom', isC); toggle('btn-cap-cancel', isC); if (isC) { document.getElementById('in-cap-custom').focus(); } };
        window.cancelCustomCap = () => { document.getElementById('in-cap').value = '4'; window.toggleCustomCap(); };
        window.toggleRepeatCount = () => { toggle('in-confirm-count', document.getElementById('in-confirm-repeat').value !== 'none'); };
        window.joinSession = async (sId) => { if (!userState) return alert("로그인 필요!"); await client.from('session_members').insert({ session_id: sId, user_id: userState.id }); renderRoom(); };
        window.leaveSession = async (sId) => { if (!userState) return; await client.from('session_members').delete().eq('session_id', sId).eq('user_id', userState.id); goLobby(); };
        document.getElementById('btn-edit-nick').onclick = () => { document.getElementById('in-nick').value = document.getElementById('display-name').innerText; toggle('modal-nick', true); };
        document.getElementById('btn-nick-close').onclick = () => toggle('modal-nick', false);
        document.getElementById('btn-nick-submit').onclick = async () => { const n = document.getElementById('in-nick').value.trim(); if (n && userState) { await client.from('users').upsert({ id: userState.id, nickname: n, avatar_url: userState.user_metadata.avatar_url }); document.getElementById('display-name').innerText = n; toggle('modal-nick', false); } };
        goLobby();
    </script>
</body>
</html>
