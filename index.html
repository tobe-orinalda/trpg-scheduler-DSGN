<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동서울·구리·남양주 TRPG 스케줄러</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans overflow-x-hidden">

    <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">🎲 TRPG 스케줄러</h1>
            
            <div id="auth-section" class="flex items-center gap-4">
                <button id="login-btn" class="bg-white text-indigo-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-100 transition shadow">
                    구글 로그인
                </button>
                
                <div id="user-info" class="hidden flex items-center gap-3">
                    <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border-2 border-white shadow-sm">
                    <span id="user-name" class="text-sm font-medium">로그인 중...</span>
                    <button id="logout-btn" class="text-xs bg-indigo-800 px-3 py-1 rounded hover:bg-indigo-900 border border-indigo-400">
                        로그아웃
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto mt-8 p-4">
        
        <section id="lobby-view" class="block">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-black text-gray-800">📌 세션 게시판</h2>
                    <p class="text-gray-500">동서울·구리·남양주 지역 소모임 일정 조율</p>
                </div>
                <button id="create-session-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transform hover:-translate-y-1 transition">
                    + 세션 열기
                </button>
            </div>
            
            <div id="session-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full py-20 text-center text-gray-400 italic">
                    로그인하면 현재 진행 중인 세션 목록을 불러올 수 있습니다.
                </div>
            </div>
        </section>

        <section id="room-view" class="hidden">
            <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-200 relative">
                <button id="back-to-lobby" class="mb-6 text-indigo-600 font-bold flex items-center gap-1 hover:underline">
                    ← 로비로 돌아가기
                </button>
                
                <div class="border-b-2 border-gray-100 pb-6 mb-8 gap-4">
                    <h2 id="current-session-title" class="text-4xl font-black text-gray-900 mb-2">세션 타이틀</h2>
                    <div id="current-session-meta" class="text-gray-500 flex gap-4">
                        </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <h3 class="font-bold text-gray-700 mb-4 italic">📅 가능 시간 선택 (Heatmap)</h3>
                        <div class="bg-gray-50 rounded-xl h-96 border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400">
                            여기에 2D 일정 표가 렌더링될 예정입니다.
                        </div>
                    </div>
                    
                    <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                        <h3 class="font-bold text-indigo-900 mb-4 underline">👤 참여 인원 현황</h3>
                        <ul id="member-list" class="space-y-3">
                            <li class="text-gray-400 italic text-sm">데이터를 불러오는 중...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
        
        <div id="create-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-lg">
                <h3 class="text-2xl font-bold mb-6">🎲 새 TRPG 세션 모집</h3>
                <div class="space-y-4 mb-6">
                    <input type="text" id="session-title-input" placeholder="세션 제목 (예: 크툴루의 부름 1회차)" class="w-full p-3 border border-gray-300 rounded-lg">
                    <input type="number" id="session-capacity-input" placeholder="모집 인원 (GM 제외)" class="w-full p-3 border border-gray-300 rounded-lg">
                </div>
                <div class="flex justify-end gap-3">
                    <button id="modal-cancel-btn" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-lg hover:bg-gray-300">취소</button>
                    <button id="modal-create-btn" class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 font-bold">생성</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 1. 역학적 기초 정보 주입 (메모장에 적어둔 정보를 여기에 넣으세요)
        const SUPABASE_URL = 'https://eebjvpvwakjumkanohzs.supabase.co';
        // [⚠️ 주의] 실제 키를 꼭 다시 넣어주세요!
        const SUPABASE_ANON_KEY = 'sb_publishable_Rlck6NADMmEyIRBz4kua5Q_izgzKAPO'; 

        // 2. 엔진 시동 (Supabase 클라이언트 초기화)
        // 충돌 방지를 위해 이름을 supabaseClient로 변경했습니다.
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 3. UI 요소 변수 선언
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementBysId('logout-btn');
        const userInfo = document.getElementById('user-info');
        const userNameText = document.getElementById('user-name');
        // [자바스크립트 수정] 사진 태그 선택
        const userAvatarImg = document.getElementById('user-avatar');
        
        const lobbyView = document.getElementById('lobby-view');
        const roomView = document.getElementById('room-view');
        const backBtn = document.getElementById('back-to-lobby');
        const createModal = document.getElementById('create-modal');
        const createSessionBtn = document.getElementById('create-session-btn');
        const modalCancelBtn = document.getElementById('modal
