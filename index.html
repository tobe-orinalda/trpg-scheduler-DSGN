<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSGN 스케줄러 이전 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2205@1.0/KoPubWorldDotum.woff2');
        body { font-family: 'KoPubWorldDotum', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; }
    </style>
    <script>
        // 5초(5000ms) 후 새로운 유니스케 주소로 자동 리다이렉트
        setTimeout(() => {
            window.location.href = "https://tobe-orinalda.github.io/trpg-universal-scheduler/";
        }, 5000);

        // 시각적 카운트다운 로직
        let count = 5;
        setInterval(() => {
            count--;
            if (count > 0) document.getElementById('countdown').innerText = count;
        }, 1000);
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-xl border border-slate-100 max-w-sm w-full text-center hover:-translate-y-1 transition-transform duration-300">
        <div class="text-6xl mb-6">🚀</div>
        <h1 class="text-2xl font-black text-indigo-700 mb-2">시스템 전면 업그레이드!</h1>
        <p class="text-sm text-slate-500 mb-8 font-bold leading-relaxed">
            DSGN 전용 스케줄러가<br>전국 범용 통합 플랫폼<br>
            <strong class="text-indigo-600 text-base">『TRPG 유니버설 스케줄러』</strong>로<br>진화했습니다!
        </p>
        
        <div class="bg-indigo-50 rounded-xl p-4 mb-6 border border-indigo-100 shadow-inner">
            <p class="text-xs text-indigo-800 font-black">
                <span id="countdown" class="text-lg text-indigo-600">5</span>초 뒤 새로운 우주로 자동 이동합니다...
            </p>
        </div>

        <a href="https://tobe-orinalda.github.io/trpg-universal-scheduler/" class="block w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-md hover:bg-indigo-800 transition-colors">
            지금 바로 이동하기 💫
        </a>
    </div>
</body>
</html>
